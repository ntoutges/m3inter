<!DOCTYPE html>
<html lang="en">

<head>
    <title>m3inter</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_circle_down,arrow_circle_up,arrow_downward,arrow_upward,chevron_left,chevron_right,east,expand_less,expand_more,north,restart_alt,rotate_left,rotate_right,south,visibility,visibility_off,west" />

    <script src="script.ts" type="module" defer></script>

</head>

<body>

    <!-- Store visibility states -->
    <input type="checkbox" id="toggle-perf-graph" hidden checked>
    <input type="checkbox" id="toggle-gizmo" hidden checked>
    <input type="checkbox" id="toggle-explorer" hidden checked>
    <input type="checkbox" id="toggle-ui" hidden checked>

    <div id="main-content">

        <div id="grid-container" class="grid"></div>

        <!-- Overlay UI -->
        <div id="ui-layer">

            <!-- Top-left: Performance -->
            <label for="toggle-perf-graph" class="panel panel-top-left" id="perf-panel">
                <div class="panel-title">Performance</div>

                <div id="stat-container"></div>
            </label>

            <!-- Top-right: Camera (gizmo + position) -->
            <label for="toggle-gizmo" class="panel panel-top-right" id="camera-panel">
                <canvas id="camera-gizmo"></canvas>

                <div class="camera-pos">
                    (
                    <span id="cam-x">0</span>,
                    <span id="cam-y">0</span>,
                    <span id="cam-z">0</span>
                    )
                </div>

                <!-- Camera Controls -->
                <div class="camera-controls">

                    <!-- Reset -->
                    <div class="cam-group">
                        <button data-cam="reset" class="reset" style="grid-column: 1 / 3" title="Reset">
                            <span class="material-symbols-outlined">restart_alt</span>
                        </button>
                    </div>

                    <!-- Translation -->
                    <div class="cam-group">
                        <!-- <button data-cam="forward" title="Forward">
                            <span class="material-symbols-outlined">north</span>
                        </button>
                        <button data-cam="backward" title="Backward">
                            <span class="material-symbols-outlined">south</span>
                        </button> -->

                        <button data-cam="left" title="Left">
                            <span class="material-symbols-outlined">west</span>
                        </button>
                        <button data-cam="right" title="Right">
                            <span class="material-symbols-outlined">east</span>
                        </button>

                        <button data-cam="up" title="Up">
                            <span class="material-symbols-outlined">expand_less</span>
                        </button>
                        <button data-cam="down" title="Down">
                            <span class="material-symbols-outlined">expand_more</span>
                        </button>
                    </div>

                    <!-- Rotation -->
                    <div class="cam-group">
                        <button data-cam="pitch-up" title="Pitch Up">
                            <span class="material-symbols-outlined">arrow_circle_up</span>
                        </button>
                        <button data-cam="pitch-down" title="Pitch Down">
                            <span class="material-symbols-outlined">arrow_circle_down</span>
                        </button>
                        <button data-cam="yaw-left" title="Yaw Left">
                            <span class="material-symbols-outlined">rotate_right</span>
                        </button>
                        <button data-cam="yaw-right" title="Yaw Right">
                            <span class="material-symbols-outlined">rotate_left</span>
                        </button>
                    </div>

                </div>
            </label>

            <!-- Bottom-left: Device Info -->
            <div class="panel panel-bottom-left" id="device-panel">
                <div class="panel-title">Device</div>
                <div>
                    Port: <span id="com-port">N/A</span>
                </div>
                <div>
                    Status:
                    <span id="connection-status" class="status offline">
                        Disconnected
                    </span>
                </div>
            </div>

            <!-- Right: Explorer toggle -->
            <label for="toggle-explorer" id="explorer-toggle">
                <span class="material-symbols-outlined on-active">chevron_right</span>
                <span class="material-symbols-outlined on-inactive">chevron_left</span>
            </label>

            <!-- Toast container -->
            <div id="toast-container"></div>

        </div>

        <label for="toggle-ui" id="ui-toggle">
            <span class="material-symbols-outlined on-active">visibility</span>
            <span class="material-symbols-outlined on-inactive">visibility_off</span>
        </label>

    </div>

    <!-- Explorer panel -->
    <div id="explorer-panel">
        <div class="panel-title">Scene Setup</div>

        <textarea id="command-input" placeholder="Enter commands..."></textarea>

        <!-- Syntax errors -->
        <div id="syntax-errors"></div>

        <button id="run-command">Run</button>

        <div class="panel-title">Active Setup</div>

        <div id="command-display-container">

            <div id="command-display"></div>

        </div>

        <!-- Runtime errors -->
        <div id="runtime-errors"></div>
    </div>
</body>

</html>
