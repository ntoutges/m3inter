name: "Build/Deploy"

on:
    push:
        branches: ["main"]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout
              uses: actions/checkout@v5
            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Install Dependencies
              run: npm ci
            - name: "Build Site"
              run: npm run build
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Upload Artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "./dist/"
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
